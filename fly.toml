app = "sii-f22"
primary_region = "gru"   # São Paulo (scl deprecado)

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 100
    hard_limit = 200

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
